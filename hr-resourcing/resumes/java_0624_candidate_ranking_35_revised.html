function render(){

  // remove structural duplicates

    seen.add(key);
    const t=(d.n+d.l+d.j+d.e+d.p).toLowerCase();
    if(q&&!t.includes(q))return false;
    if(gf&&d.g!==gf)return false;
    return true;
  });
  if(sf==="exp")rows.sort((a,b)=>b.x-a.x);
  else if(sf==="score")rows.sort((a,b)=>b.s-a.s);
  else if(sf==="name")rows.sort((a,b)=>a.n.localeCompare(b.n));
  else rows.sort((a,b)=>a.r-b.r);

  document.getElementById("cnt").textContent=rows.length+" of 33 unique candidates shown (35 files — 2 cross-batch duplicates noted)";
  document.getElementById("tb").innerHTML=rows.map((d,i)=>`

}
